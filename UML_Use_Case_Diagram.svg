<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850" width="100%" height="100%">
  <!-- Definitions -->
  <defs>
    <!-- Arrow marker for <<include>> dependency -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
    </marker>
    
    <!-- Stickman Actor -->
    <g id="stickman">
      <circle cx="0" cy="-30" r="12" fill="#ffffff" stroke="#333" stroke-width="2"/>
      <line x1="0" y1="-18" x2="0" y2="20" stroke="#333" stroke-width="2"/>
      <line x1="-20" y1="0" x2="20" y2="0" stroke="#333" stroke-width="2"/>
      <line x1="0" y1="20" x2="-15" y2="50" stroke="#333" stroke-width="2"/>
      <line x1="0" y1="20" x2="15" y2="50" stroke="#333" stroke-width="2"/>
    </g>
    
    <!-- Server/Cloud Actor -->
    <g id="server-cloud">
      <path d="M -35 15 C -55 15, -55 -15, -25 -15 C -25 -45, 25 -45, 35 -15 C 60 -15, 55 15, 35 15 Z" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
      <rect x="-15" y="5" width="30" height="20" rx="3" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
      <line x1="-15" y1="12" x2="15" y2="12" stroke="#1565c0" stroke-width="1"/>
      <line x1="-15" y1="19" x2="15" y2="19" stroke="#1565c0" stroke-width="1"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="1000" height="850" fill="#ffffff"/>

  <!-- Connection Lines (Drawn behind ellipses) -->
  <g stroke="#888" stroke-width="1.5" fill="none">
    
    <!-- Lines from Admin (850, 150) -->
    <line x1="850" y1="150" x2="500" y2="100" /> <!-- Register/Login -->
    <line x1="850" y1="150" x2="500" y2="165" /> <!-- Manage Users -->
    <line x1="850" y1="150" x2="500" y2="250" /> <!-- Upload Dataset -->
    <line x1="850" y1="150" x2="600" y2="315" /> <!-- Build & Train -->
    <line x1="850" y1="150" x2="500" y2="380" /> <!-- Deploy Model -->

    <!-- Lines from Translator Server (850, 400) - slightly lighter stroke -->
    <g stroke="#b0bec5" stroke-width="1">
      <line x1="850" y1="400" x2="500" y2="100" />
      <line x1="850" y1="400" x2="500" y2="165" />
      <line x1="850" y1="400" x2="500" y2="250" />
      <line x1="850" y1="400" x2="600" y2="315" />
      <line x1="850" y1="400" x2="500" y2="380" />
      <line x1="850" y1="400" x2="500" y2="460" />
      <line x1="850" y1="400" x2="500" y2="525" />
      <line x1="850" y1="400" x2="500" y2="590" />
      <line x1="850" y1="400" x2="500" y2="655" />
      <line x1="850" y1="400" x2="500" y2="720" />
    </g>

    <!-- Lines from Deaf User (150, 550) -->
    <line x1="150" y1="550" x2="500" y2="460" /> <!-- Input Sign -->
    <line x1="150" y1="550" x2="500" y2="525" /> <!-- Prediction -->
    <line x1="150" y1="550" x2="500" y2="590" /> <!-- Avatar/Sign -->
    <line x1="150" y1="550" x2="500" y2="655" /> <!-- Input Speech -->
    <line x1="150" y1="550" x2="500" y2="720" /> <!-- Detect Sign Text -->

    <!-- Lines from Non-Deaf User (850, 650) -->
    <line x1="850" y1="650" x2="500" y2="525" /> <!-- Prediction -->
    <line x1="850" y1="650" x2="500" y2="590" /> <!-- Avatar/Sign -->
    <line x1="850" y1="650" x2="500" y2="655" /> <!-- Input Speech -->
    <line x1="850" y1="650" x2="500" y2="720" /> <!-- Detect Sign Text -->
    
    <!-- Dashed <<include>> line -->
    <line x1="490" y1="315" x2="425" y2="315" stroke-dasharray="5,5" stroke="#555" marker-end="url(#arrow)" />
  </g>

  <!-- System Boundary -->
  <rect x="210" y="40" width="580" height="740" fill="#fafafa" stroke="#333" stroke-width="2" rx="10"/>
  <text x="500" y="70" font-family="sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">Intelligent Sign Language Translator System</text>

  <!-- Dashed Box for Machine Learning Pipeline Group -->
  <rect x="390" y="210" width="340" height="210" fill="rgba(0,0,0,0.02)" stroke="#666" stroke-width="2" stroke-dasharray="10,5" rx="5"/>
  <text x="650" y="230" font-family="sans-serif" font-size="12" fill="#666" font-style="italic">Model Operations</text>

  <!-- USE CASES -->
  
  <!-- UC1: Register / Login -->
  <ellipse cx="500" cy="100" rx="100" ry="25" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="500" y="105" font-family="sans-serif" font-size="14" fill="#000" text-anchor="middle">Register / Login</text>
  
  <!-- UC2: Manage Users -->
  <ellipse cx="500" cy="165" rx="100" ry="25" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="500" y="170" font-family="sans-serif" font-size="14" fill="#000" text-anchor="middle">Manage Users</text>

  <!-- UC3: Upload Dataset -->
  <ellipse cx="500" cy="250" rx="100" ry="25" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="500" y="255" font-family="sans-serif" font-size="14" fill="#000" text-anchor="middle">Upload Dataset</text>

  <!-- UC4: Build & Train Model -->
  <ellipse cx="600" cy="315" rx="110" ry="25" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="600" y="320" font-family="sans-serif" font-size="14" fill="#000" text-anchor="middle">Build &amp; Train Model</text>

  <!-- UC4b: Preprocessing (Extension/Include) -->
  <ellipse cx="320" cy="315" rx="100" ry="35" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="320" y="305" font-family="sans-serif" font-size="12" fill="#000" text-anchor="middle">Preprocessing,</text>
  <text x="320" y="320" font-family="sans-serif" font-size="12" fill="#000" text-anchor="middle">Feature Extraction,</text>
  <text x="320" y="335" font-family="sans-serif" font-size="12" fill="#000" text-anchor="middle">Classification</text>
  <!-- <<include>> text label -->
  <text x="460" y="305" font-family="sans-serif" font-size="12" fill="#555" font-style="italic" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>

  <!-- UC5: Deploy Model -->
  <ellipse cx="500" cy="380" rx="100" ry="25" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="500" y="385" font-family="sans-serif" font-size="14" fill="#000" text-anchor="middle">Deploy Model</text>

  <!-- UC6: Input Sign -->
  <ellipse cx="500" cy="460" rx="100" ry="25" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="500" y="465" font-family="sans-serif" font-size="14" fill="#000" text-anchor="middle">Input Sign</text>

  <!-- UC7: Prediction -->
  <ellipse cx="500" cy="525" rx="100" ry="25" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="500" y="530" font-family="sans-serif" font-size="14" fill="#000" text-anchor="middle">Prediction</text>

  <!-- UC8: Avatar/Sign -->
  <ellipse cx="500" cy="590" rx="100" ry="25" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="500" y="595" font-family="sans-serif" font-size="14" fill="#000" text-anchor="middle">Avatar/Sign</text>

  <!-- UC9: Input Speech -->
  <ellipse cx="500" cy="655" rx="100" ry="25" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="500" y="660" font-family="sans-serif" font-size="14" fill="#000" text-anchor="middle">Input Speech</text>

  <!-- UC10: Detect Sign Text -->
  <ellipse cx="500" cy="720" rx="100" ry="25" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="500" y="725" font-family="sans-serif" font-size="14" fill="#000" text-anchor="middle">Detect Sign Text</text>


  <!-- ACTORS -->
  
  <!-- Admin -->
  <use href="#stickman" x="850" y="150" />
  <text x="850" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="middle">Admin</text>

  <!-- Translator Server -->
  <use href="#server-cloud" x="850" y="400" />
  <text x="850" y="440" font-family="sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="middle">Translator Server</text>

  <!-- Non-Deaf User -->
  <use href="#stickman" x="850" y="650" />
  <text x="850" y="720" font-family="sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="middle">Non-Deaf User</text>

  <!-- Deaf User -->
  <use href="#stickman" x="150" y="550" />
  <text x="150" y="620" font-family="sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="middle">Deaf User</text>

</svg>
