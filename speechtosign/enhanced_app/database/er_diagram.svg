<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .zone { fill: #eef6ff; stroke: #93c5fd; stroke-width: 2; rx: 20; }
      .zone2 { fill: #f0fdf4; stroke: #86efac; stroke-width: 2; rx: 20; }
      .entity { fill: #ffffff; stroke: #1f538d; stroke-width: 2.2; rx: 12; }
      .entity-green { fill: #ffffff; stroke: #15803d; stroke-width: 2.2; rx: 12; }
      .entity-gray { fill: #ffffff; stroke: #64748b; stroke-width: 2.2; rx: 12; }
      .header { fill: #1f538d; rx: 10; }
      .header-green { fill: #15803d; rx: 10; }
      .header-gray { fill: #64748b; rx: 10; }
      .title { font: 700 34px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 21px Segoe UI, Arial, sans-serif; fill: #334155; }
      .label { font: 700 18px Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .text { font: 15px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .small { font: 13px Segoe UI, Arial, sans-serif; fill: #475569; }
      .rel { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .rel-dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .cardnote { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; rx: 10; }
      .pk { font-weight: 700; fill: #1d4ed8; }
      .fk { fill: #b45309; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1000"/>
  <text class="title" x="800" y="54" text-anchor="middle">Intelligent Sign Language Translator - ER Diagram</text>
  <text class="subtitle" x="800" y="86" text-anchor="middle">Single-page database design for Users, Translation History, Favorites, Sessions, Settings, Goals and Achievements</text>

  <rect class="zone" x="45" y="125" width="705" height="805"/>
  <text class="subtitle" x="75" y="165">app.db - Main Application Data</text>

  <rect class="zone2" x="850" y="125" width="705" height="805"/>
  <text class="subtitle" x="880" y="165">settings.db - Preferences, Goals and Achievements</text>

  <!-- USERS -->
  <rect class="entity" x="525" y="370" width="280" height="235"/>
  <rect class="header" x="525" y="370" width="280" height="44"/>
  <text class="label" x="665" y="398" text-anchor="middle">users</text>
  <text class="text" x="545" y="440"><tspan class="pk">PK</tspan> user_id</text>
  <text class="text" x="545" y="468">username UNIQUE</text>
  <text class="text" x="545" y="496">email UNIQUE</text>
  <text class="text" x="545" y="524">password_hash</text>
  <text class="text" x="545" y="552">full_name</text>
  <text class="text" x="545" y="580">created_at, last_login</text>

  <!-- app.db entities -->
  <rect class="entity" x="95" y="220" width="325" height="210"/>
  <rect class="header" x="95" y="220" width="325" height="44"/>
  <text class="label" x="257" y="248" text-anchor="middle">translation_history</text>
  <text class="text" x="115" y="290"><tspan class="pk">PK</tspan> history_id</text>
  <text class="text" x="115" y="318"><tspan class="fk">FK</tspan> user_id -> users.user_id</text>
  <text class="text" x="115" y="346">input_text</text>
  <text class="text" x="115" y="374">translated_text</text>
  <text class="text" x="115" y="402">translation_date, duration_seconds</text>

  <rect class="entity" x="95" y="485" width="325" height="175"/>
  <rect class="header" x="95" y="485" width="325" height="44"/>
  <text class="label" x="257" y="513" text-anchor="middle">favorites</text>
  <text class="text" x="115" y="555"><tspan class="pk">PK</tspan> favorite_id</text>
  <text class="text" x="115" y="583"><tspan class="fk">FK</tspan> user_id -> users.user_id</text>
  <text class="text" x="115" y="611">phrase</text>
  <text class="text" x="115" y="639">added_date</text>

  <rect class="entity" x="95" y="715" width="325" height="175"/>
  <rect class="header" x="95" y="715" width="325" height="44"/>
  <text class="label" x="257" y="743" text-anchor="middle">sessions</text>
  <text class="text" x="115" y="785"><tspan class="pk">PK</tspan> session_id</text>
  <text class="text" x="115" y="813"><tspan class="fk">FK</tspan> user_id -> users.user_id</text>
  <text class="text" x="115" y="841">login_time, logout_time</text>
  <text class="text" x="115" y="869">translations_count</text>

  <!-- settings.db entities -->
  <rect class="entity-green" x="895" y="205" width="335" height="260"/>
  <rect class="header-green" x="895" y="205" width="335" height="44"/>
  <text class="label" x="1062" y="233" text-anchor="middle">user_preferences</text>
  <text class="text" x="915" y="275"><tspan class="pk">PK/FK</tspan> user_id -> users.user_id</text>
  <text class="text" x="915" y="303">theme, color_scheme</text>
  <text class="text" x="915" y="331">font_size</text>
  <text class="text" x="915" y="359">animation_speed</text>
  <text class="text" x="915" y="387">auto_save</text>
  <text class="text" x="915" y="415">sound_enabled</text>
  <text class="text" x="915" y="443">notifications_enabled, language</text>

  <rect class="entity-green" x="895" y="520" width="335" height="190"/>
  <rect class="header-green" x="895" y="520" width="335" height="44"/>
  <text class="label" x="1062" y="548" text-anchor="middle">daily_goals</text>
  <text class="text" x="915" y="590"><tspan class="pk">PK</tspan> goal_id</text>
  <text class="text" x="915" y="618"><tspan class="fk">FK</tspan> user_id -> users.user_id</text>
  <text class="text" x="915" y="646">date</text>
  <text class="text" x="915" y="674">target_translations</text>
  <text class="text" x="915" y="702">completed_translations</text>

  <rect class="entity-green" x="895" y="765" width="335" height="135"/>
  <rect class="header-green" x="895" y="765" width="335" height="44"/>
  <text class="label" x="1062" y="793" text-anchor="middle">user_achievements</text>
  <text class="text" x="915" y="835"><tspan class="pk">PK/FK</tspan> user_id</text>
  <text class="text" x="915" y="863"><tspan class="pk">PK/FK</tspan> achievement_id</text>
  <text class="text" x="915" y="891">earned_date</text>

  <rect class="entity-green" x="1265" y="710" width="250" height="190"/>
  <rect class="header-green" x="1265" y="710" width="250" height="44"/>
  <text class="label" x="1390" y="738" text-anchor="middle">achievements</text>
  <text class="text" x="1285" y="780"><tspan class="pk">PK</tspan> achievement_id</text>
  <text class="text" x="1285" y="808">name</text>
  <text class="text" x="1285" y="836">description, icon</text>
  <text class="text" x="1285" y="864">requirement</text>
  <text class="text" x="1285" y="892">points</text>

  <rect class="entity-gray" x="1265" y="205" width="250" height="145"/>
  <rect class="header-gray" x="1265" y="205" width="250" height="44"/>
  <text class="label" x="1390" y="233" text-anchor="middle">app_settings</text>
  <text class="text" x="1285" y="275"><tspan class="pk">PK</tspan> setting_key</text>
  <text class="text" x="1285" y="303">setting_value</text>
  <text class="text" x="1285" y="331">updated_at</text>

  <!-- Relationships -->
  <path class="rel" d="M 420 325 C 480 325, 500 430, 525 455"/>
  <text class="small" x="415" y="307">1 user has many translations</text>

  <path class="rel" d="M 420 572 C 475 572, 500 525, 525 505"/>
  <text class="small" x="396" y="557">1 user has many favorites</text>

  <path class="rel" d="M 420 803 C 490 803, 505 605, 525 565"/>
  <text class="small" x="390" y="786">1 user has many sessions</text>

  <path class="rel-dash" d="M 805 455 C 850 410, 865 345, 895 320"/>
  <text class="small" x="805" y="365">1 user has 1 preference row</text>

  <path class="rel-dash" d="M 805 520 C 850 550, 865 615, 895 625"/>
  <text class="small" x="805" y="586">1 user has many daily goals</text>

  <path class="rel-dash" d="M 805 565 C 850 680, 860 825, 895 835"/>
  <text class="small" x="800" y="720">1 user earns many achievements</text>

  <path class="rel" d="M 1230 833 L 1265 805"/>
  <text class="small" x="1238" y="786">many-to-one</text>

  <!-- Note -->
  <rect class="cardnote" x="525" y="690" width="280" height="155"/>
  <text class="subtitle" x="665" y="722" text-anchor="middle">Legend / Viva Note</text>
  <text class="small" x="545" y="755">PK = Primary Key</text>
  <text class="small" x="545" y="781">FK = Foreign Key / logical link</text>
  <text class="small" x="545" y="807">Dashed lines cross database files</text>
  <text class="small" x="545" y="833">users is the central parent table</text>

  <text class="small" x="800" y="965" text-anchor="middle">Core relationship summary: one user can have many translations, favorites, sessions, daily goals, and earned achievements; one user has one preference record.</text>
</svg>
